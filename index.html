<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --segment-bg: #444444; /* צבע אפור כהה כמו בתמונה */
            --number-color: #ffcc00; /* צהוב זהב */
            --label-color: #ffffff;
            --warning-color: #ff4444;
        }

        /* שקיפות מלאה וביטול רווחים */
        html, body {
            margin: 0;
            padding: 0;
            background-color: transparent !important; /* מבטל את הרקע הלבן */
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .wrapper {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 10px; /* צמצום שוליים למינימום */
        }

        /* סידור דקות משמאל ושניות מימין */
        .countdown-container {
            display: flex;
            gap: 12px;
            direction: ltr; /* מבטיח שדקות יהיו בצד שמאל */
            cursor: pointer;
        }

        .time-segment {
            background-color: var(--segment-bg);
            padding: 15px 10px;
            border-radius: 12px; /* פינות מעוגלות כמו בתמונה */
            min-width: 85px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .number {
            font-size: 3.5rem;
            font-weight: 900;
            display: block;
            color: var(--number-color);
            line-height: 0.9;
            margin-bottom: 5px;
        }

        .label {
            font-size: 0.8rem;
            color: var(--label-color);
            font-weight: bold;
            opacity: 0.9;
        }

        /* אנימציית התראה */
        .warning .number {
            animation: pulse-red 1s infinite;
        }

        @keyframes pulse-red {
            50% { color: var(--warning-color); transform: scale(1.05); }
        }

        /* כפתור הגדרות שקוף בפינה */
        .settings-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.2;
            transition: opacity 0.3s;
        }
        .settings-btn:hover { opacity: 1; }

        /* פאנל הגדרות */
        #config-panel {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #222;
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
            color: white;
            box-shadow: 0 0 20px black;
            width: 160px;
            text-align: center;
        }

        input {
            width: 80%;
            margin: 5px 0 10px;
            padding: 5px;
            text-align: center;
            border-radius: 4px;
            border: none;
        }

        .save-btn {
            background: var(--number-color);
            border: none;
            padding: 8px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<audio id="warnBeep"><source src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" type="audio/mpeg"></audio>
<audio id="endSound"><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg"></audio>

<div class="wrapper">
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
    
    <div class="countdown-container" id="timerDisplay" onclick="toggleSettings()">
        <div class="time-segment">
            <span class="number" id="minutes">00</span>
            <span class="label">דקות</span>
        </div>
        <div class="time-segment">
            <span class="number" id="seconds">00</span>
            <span class="label">שניות</span>
        </div>
    </div>

    <div id="config-panel">
        <label>דקות לספירה:</label>
        <input type="number" id="minInput" value="10">
        <label>התראה (שניות):</label>
        <input type="number" id="warnInput" value="60">
        <button class="save-btn" onclick="startTimer()">הפעל</button>
    </div>
</div>

<script>
    let timeLeft = 600; 
    let warnTime = 60; 
    let timerInterval;
    let warnPlayed = false;

    function toggleSettings() {
        const panel = document.getElementById('config-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    function startTimer() {
        const mins = document.getElementById('minInput').value;
        warnTime = document.getElementById('warnInput').value;
        timeLeft = mins * 60;
        warnPlayed = false;
        document.getElementById('timerDisplay').classList.remove('warning');
        clearInterval(timerInterval);
        timerInterval = setInterval(update, 1000);
        toggleSettings();
        update();
    }

    function update() {
        if (timeLeft <= 0) {
            document.getElementById("minutes").innerText = "00";
            document.getElementById("seconds").innerText = "00";
            document.getElementById("endSound").play().catch(()=>{});
            clearInterval(timerInterval);
            return;
        }

        // ביפ קצר בהתראה מוקדמת
        if (timeLeft <= warnTime && !warnPlayed) {
            document.getElementById('timerDisplay').classList.add('warning');
            document.getElementById("warnBeep").play().catch(()=>{});
            warnPlayed = true;
        }

        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;

        document.getElementById("minutes").innerText = String(m).padStart(2, '0');
        document.getElementById("seconds").innerText = String(s).padStart(2, '0');
        
        timeLeft--;
    }

    timerInterval = setInterval(update, 1000);
    update();
</script>
</body>
</html>
