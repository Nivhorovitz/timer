<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --accent-color: #00ff88; 
            --warning-color: #ffcc00;
            --bg-segment: rgba(0, 0, 0, 0.4); /* שקיפות גבוהה יותר */
            --text-color: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; 
            background-color: transparent; /* רקע דף שקוף */
            overflow: hidden;
            color: var(--text-color);
        }

        .wrapper { 
            position: relative; 
            padding: 5px; /* צמצום שוליים חיצוניים */
            display: inline-block;
        }

        .countdown-container {
            display: flex; 
            gap: 8px; /* רווח קטן בין הקוביות */
            cursor: pointer; 
            justify-content: center;
            direction: ltr; /* גורם לדקות להיות משמאל ולשניות מימין */
        }

        .time-segment {
            background: var(--bg-segment);
            padding: 10px 15px; /* הקטנת המסגרת מסביב למספרים */
            border-radius: 8px;
            min-width: 60px; 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .number {
            font-size: 2.5rem; /* גודל בולט אך קומפקטי */
            font-weight: 900; 
            display: block;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color);
            line-height: 1;
        }

        .warning .number {
            color: var(--warning-color);
            text-shadow: 0 0 15px var(--warning-color);
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.6; } }

        .label { 
            font-size: 0.65rem; 
            opacity: 0.8; 
            margin-top: 4px; 
            display: block; 
            text-transform: uppercase;
        }

        /* פאנל הגדרות קומפקטי */
        #config-panel {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #222;
            padding: 15px; border-radius: 10px; z-index: 100;
            box-shadow: 0 0 20px rgba(0,0,0,0.9); width: 180px;
            border: 1px solid #444;
        }

        input {
            width: 90%; padding: 5px; margin: 5px 0 12px 0;
            border-radius: 4px; border: 1px solid #444; background: #111; color: white;
            text-align: center; font-size: 0.9rem;
        }

        .save-btn {
            background: var(--accent-color); border: none; padding: 8px;
            border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%;
        }

        .settings-btn {
            position: absolute; top: -5px; left: -5px; background: none;
            border: none; color: white; cursor: pointer; font-size: 1rem; opacity: 0.3;
        }
        .settings-btn:hover { opacity: 1; }
    </style>
</head>
<body>

<audio id="endSound"><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg"></audio>
<audio id="warnSound"><source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg"></audio>

<div class="wrapper">
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
    
    <div class="countdown-container" id="timerDisplay" onclick="toggleSettings()">
        <div class="time-segment">
            <span class="number" id="minutes">00</span>
            <span class="label">דקות</span>
        </div>
        <div class="time-segment">
            <span class="number" id="seconds">00</span>
            <span class="label">שניות</span>
        </div>
    </div>

    <div id="config-panel">
        <label style="font-size: 0.8rem;">דקות לספירה:</label>
        <input type="number" id="minInput" value="10" min="1">
        <label style="font-size: 0.8rem;">התראה מוקדמת (שניות):</label>
        <input type="number" id="warnInput" value="60">
        <button class="save-btn" onclick="startTimer()">הפעל</button>
    </div>
</div>

<script>
    let timeLeft = 600; 
    let warnTime; 
    let timerInterval;
    let endPlayed = false;
    let warnPlayed = false;

    function toggleSettings() {
        const panel = document.getElementById('config-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    function startTimer() {
        const mins = document.getElementById('minInput').value;
        warnTime = document.getElementById('warnInput').value;
        timeLeft = mins * 60;
        endPlayed = false;
        warnPlayed = false;
        document.getElementById('timerDisplay').classList.remove('warning');
        clearInterval(timerInterval);
        timerInterval = setInterval(update, 1000);
        toggleSettings();
        update();
    }

    function update() {
        if (timeLeft <= 0) {
            document.getElementById("minutes").innerText = "00";
            document.getElementById("seconds").innerText = "00";
            if (!endPlayed) {
                document.getElementById("endSound").play().catch(()=>{});
                endPlayed = true;
            }
            clearInterval(timerInterval);
            return;
        }

        if (timeLeft <= warnTime && !warnPlayed) {
            document.getElementById('timerDisplay').classList.add('warning');
            document.getElementById("warnSound").play().catch(()=>{});
            warnPlayed = true;
        }

        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;

        document.getElementById("minutes").innerText = String(m).padStart(2, '0');
        document.getElementById("seconds").innerText = String(s).padStart(2, '0');
        
        timeLeft--;
    }

    timerInterval = setInterval(update, 1000);
    update();
</script>
</body>
</html>
