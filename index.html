<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            /* הצבעים שביקשת */
            --segment-bg: #bcbfff; 
            --number-color: #e8ff6a; 
            --label-color: #333333; /* צבע כהה לכיתוב שיהיה קריא על הרקע הבהיר */
            --warning-color: #ff4444;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: transparent !important;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 40px; /* רווח מוגדל כדי שגלגל השיניים לא יכוסה */
        }

        .countdown-container {
            display: flex;
            gap: 15px;
            direction: ltr; /* דקות משמאל, שניות מימין */
            align-items: center;
        }

        .time-segment {
            background-color: var(--segment-bg);
            padding: 15px;
            border-radius: 12px;
            min-width: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .number {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--number-color);
            line-height: 1;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2); /* צל קטן להבלטה */
        }

        .label {
            font-size: 0.85rem;
            color: var(--label-color);
            font-weight: bold;
            margin-top: 5px;
        }

        /* כפתור הגדרות - ממוקם מחוץ למסגרת הספרות */
        .settings-btn {
            position: absolute;
            top: 10px;
            right: 5px;
            background: none;
            border: none;
            color: #333;
            cursor: pointer;
            font-size: 1.3rem;
            opacity: 0.4;
            transition: opacity 0.3s;
            z-index: 10;
        }
        .settings-btn:hover { opacity: 1; }

        /* פאנל הגדרות */
        #config-panel {
            display: none;
            position: absolute;
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
            color: #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            width: 170px;
            text-align: center;
            border: 1px solid #ccc;
        }

        input {
            width: 80%;
            margin: 5px 0 10px;
            padding: 5px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .save-btn {
            background: #333;
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        /* התראה */
        .warning .number {
            animation: pulse-warn 1s infinite;
        }
        @keyframes pulse-warn {
            50% { color: var(--warning-color); }
        }
    </style>
</head>
<body>

<audio id="warnBeep"><source src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" type="audio/mpeg"></audio>
<audio id="endSound"><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg"></audio>

<div class="wrapper">
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
    
    <div class="countdown-container" id="timerDisplay" onclick="toggleSettings()">
        <div class="time-segment">
            <span class="number" id="minutes">00</span>
            <span class="label">דקות</span>
        </div>
        <div class="time-segment">
            <span class="number" id="seconds">00</span>
            <span class="label">שניות</span>
        </div>
    </div>

    <div id="config-panel">
        <label>דקות:</label><br>
        <input type="number" id="minInput" value="10"><br>
        <label>התראה (שניות):</label><br>
        <input type="number" id="warnInput" value="60">
        <button class="save-btn" onclick="startTimer()">הפעל</button>
    </div>
</div>

<script>
    let timeLeft = 600; 
    let warnTime = 60; 
    let timerInterval;
    let warnPlayed = false;

    function toggleSettings() {
        const panel = document.getElementById('config-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    function startTimer() {
        const mins = document.getElementById('minInput').value;
        warnTime = document.getElementById('warnInput').value;
        timeLeft = mins * 60;
        warnPlayed = false;
        document.getElementById('timerDisplay').classList.remove('warning');
        clearInterval(timerInterval);
        timerInterval = setInterval(update, 1000);
        toggleSettings();
        update();
    }

    function update() {
        if (timeLeft <= 0) {
            document.getElementById("minutes").innerText = "00";
            document.getElementById("seconds").innerText = "00";
            document.getElementById("endSound").play().catch(()=>{});
            clearInterval(timerInterval);
            return;
        }

        if (timeLeft <= warnTime && !warnPlayed) {
            document.getElementById('timerDisplay').classList.add('warning');
            document.getElementById("warnBeep").play().catch(()=>{});
            warnPlayed = true;
        }

        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;

        document.getElementById("minutes").innerText = String(m).padStart(2, '0');
        document.getElementById("seconds").innerText = String(s).padStart(2, '0');
        
        timeLeft--;
    }

    timerInterval = setInterval(update, 1000);
    update();
</script>
</body>
</html>
